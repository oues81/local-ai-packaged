# Caddy internal path-based router, bound to local HTTP only
# Access from outside via SSH port-forward (e.g. -L 18080:127.0.0.1:18080)

http://:18080 {
  log {
    output stdout
    format json
    level INFO
  }

  # Archon (host service)
  handle_path /archon* {
    reverse_proxy host.docker.internal:8110
    # Enable health checks only if /health exists on the backend
    # health_checks { active { path /health interval 15s timeout 2s } }
  }

  # Ollama (host service) — protect with basic_auth after inserting a real hash
  @ollama path /ollama*
  # basic_auth @ollama {
  #   admin REPLACE_WITH_HASH
  # }
  handle_path /ollama* {
    reverse_proxy ollama:11434
  }

  # STI-MCP (host service)
  handle_path /sti-mcp* {
    reverse_proxy host.docker.internal:8006
    # health_checks { active { path /health interval 15s timeout 2s } }
  }

  # MCP (host service)
  handle_path /mcp* {
    reverse_proxy host.docker.internal:8010
    # health_checks { active { path /health interval 15s timeout 2s } }
  }

  # RH-CV-Vector (host service)
  handle_path /rh-cv-vector* {
    reverse_proxy host.docker.internal:8011
    # health_checks { active { path /health interval 15s timeout 2s } }
  }

  # Default
  handle {
    respond "Not found" 404
  }
}
