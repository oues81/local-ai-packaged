# Supabase est optionnel - décommentez pour l'activer (nécessite plus de RAM)
# include:
#   - ./supabase/docker/docker-compose.yml

volumes:
  laip_n8n_storage:
  laip_ollama_storage:
  laip_qdrant_storage:
  laip_open-webui:
  laip_flowise:
  laip_caddy-data:
  laip_caddy-config:
  laip_caddy-server-config:
  laip_valkey-data:
  laip_langfuse_postgres_data:
  laip_langfuse_clickhouse_data:
  laip_langfuse_clickhouse_logs:
  laip_langfuse_minio_data:
  laip_ollama_models:

x-n8n: &service-n8n
  image: n8nio/n8n:latest
  environment:
    - DB_TYPE=postgresdb
    - DB_POSTGRESDB_HOST=postgres
    - DB_POSTGRESDB_PORT=5432
    - DB_POSTGRESDB_USER=postgres
    - DB_POSTGRESDB_PASSWORD=${POSTGRES_PASSWORD}
    - DB_POSTGRESDB_DATABASE=postgres
    - N8N_DIAGNOSTICS_ENABLED=false
    - N8N_PERSONALIZATION_ENABLED=false
    - N8N_ENCRYPTION_KEY
    - N8N_USER_MANAGEMENT_JWT_SECRET
    - WEBHOOK_URL=${N8N_HOSTNAME:+https://}${N8N_HOSTNAME:-http://localhost:5678}

x-ollama: &service-ollama
  image: ollama/ollama:latest
  container_name: laip-ollama
  restart: unless-stopped
  networks:
    - laip_ai_network
  environment:
    - OLLAMA_HOST=0.0.0.0
    - OLLAMA_CONTEXT_LENGTH=4096  # Contexte augmenté pour de meilleurs résultats
    - OLLAMA_FLASH_ATTENTION=0    # Désactivé pour compatibilité
    - OLLAMA_KV_CACHE_TYPE=q0_K_M # Quantification optimale
    - OLLAMA_MAX_LOADED_MODELS=1  # Un seul modèle chargé à la fois
    - OLLAMA_NUM_GPU=0            # Mode CPU
    - OLLAMA_NUM_THREADS=10       # 10 threads pour de meilleures performances
    - OLLAMA_NUM_PARALLEL=4       # Nombre de requêtes en parallèle pour embeddings
  ports:
    - "${OLLAMA_PORT:-11434}:11434"
  volumes:
    - /mnt/c/Users/oues/.ollama:/root/.ollama
  healthcheck:
    test: curl -f http://localhost:11434/api/health || exit 1
    interval: 30s
    timeout: 10s
    retries: 3
    start_period: 40s
  deploy:
    resources:
      limits:
        cpus: '2'
        memory: 3G
      reservations:
        cpus: '0.5'
        memory: 1G

x-init-ollama: &init-ollama
  image: ollama/ollama:latest
  container_name: laip-ollama-pull-llama
  networks:
    - laip_ai_network
  volumes:
    - /mnt/c/Users/oues/.ollama:/root/.ollama
  entrypoint: /bin/sh
  command:
    - "-c"
    - "sleep 3; OLLAMA_HOST=ollama:11434 ollama pull qwen2.5:7b-instruct-q4_K_M; OLLAMA_HOST=ollama:11434 ollama pull nomic-embed-text; OLLAMA_HOST=ollama:11434 ollama pull mistral:7b"

x-langfuse-common: &langfuse-common
   CLICKHOUSE_URL: clickhouse://clickhouse:${CLICKHOUSE_PASSWORD}@clickhouse:9000/default
   CLICKHOUSE_MIGRATION_URL: clickhouse://clickhouse:${CLICKHOUSE_PASSWORD}@clickhouse:9000/default
   CLICKHOUSE_HOST: clickhouse
   CLICKHOUSE_PORT: "9000"
   CLICKHOUSE_DATABASE: default
   CLICKHOUSE_USER: clickhouse
   CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD}
   DATABASE_URL: postgres://postgres:${POSTGRES_PASSWORD}@postgres:5432/langfuse
   LANGFUSE_PUBLIC_KEY: ${LANGFUSE_INIT_PROJECT_PUBLIC_KEY:-}
   LANGFUSE_SECRET_KEY: ${LANGFUSE_INIT_PROJECT_SECRET_KEY:-}
   LANGFUSE_S3_EVENT_UPLOAD_BUCKET: langfuse
   LANGFUSE_S3_EVENT_UPLOAD_PREFIX: events
   REDIS_HOST: redis
   REDIS_PORT: "6379"
   SALT: ${LANGFUSE_SALT}
   LANGFUSE_SALT: ${LANGFUSE_SALT}
   S3_BUCKET_NAME: langfuse
   S3_REGION: us-east-1
   S3_ENDPOINT: http://minio:9000
   S3_ACCESS_KEY_ID: minio
   S3_SECRET_ACCESS_KEY: ${MINIO_PASSWORD}
   LANGFUSE_S3_UPLOAD_MAX_SIZE: "52428800"

services:
  laip_flowise:
    image: flowiseai/flowise
    restart: unless-stopped
    container_name: laip-flowise
    ports:
      - "${FLOWISE_PORT:-8001}:3001"
    expose:
      - 3001/tcp
    environment:
        - PORT=3001
        - FLOWISE_USERNAME=${FLOWISE_USERNAME}
        - FLOWISE_PASSWORD=${FLOWISE_PASSWORD}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
        - ~/.laip_flowise:/root/.flowise
    entrypoint: /bin/sh -c "sleep 3; flowise start"
    healthcheck:
      test: curl -f http://localhost:3001/ || exit 1
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 512M

  laip_open-webui:
    image: ghcr.io/open-webui/laip_open-webui:main
    restart: unless-stopped
    container_name: laip-open-webui
    expose:
      - 8080/tcp
    ports:
      - "${OPEN_WEBUI_PORT:-8050}:8080"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - laip_open-webui:/app/backend/data
    networks:
      - laip_ai_network
    healthcheck:
      test: curl -f http://localhost:8080/health || exit 1
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    deploy:
       resources:
        limits:
          cpus: '1.0'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 512M

  n8n-import:
    <<: *service-n8n
    container_name: laip-n8n-import
    entrypoint: /bin/sh
    command:
      - "-c"
      - "n8n import:credentials --separate --input=/backup/credentials && n8n import:workflow --separate --input=/backup/workflows"
    volumes:
      - ./n8n/backup:/backup
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 512M

  n8n:
    <<: *service-n8n
    container_name: laip-n8n
    restart: unless-stopped
    ports:
      - "${N8N_PORT:-8002}:5678"
    expose:
      - 5678/tcp
    volumes:
      - laip_n8n_storage:/home/node/.n8n
      - ./n8n/backup:/backup
      - ./shared:/data/shared
    # depends_on:
      # n8n-import:
      #   condition: service_completed_successfully
    healthcheck:
      test: wget -qO- http://localhost:5678/healthz || exit 1
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 512M

  qdrant:
    image: qdrant/qdrant
    container_name: laip-qdrant
    restart: unless-stopped
    ports:
      - "${QDRANT_HTTP_PORT:-8003}:6333"
      - "${QDRANT_GRPC_PORT:-8004}:6334"
    expose:
      - 6333/tcp
      - 6334/tcp
    volumes:
      - laip_qdrant_storage:/qdrant/storage
    healthcheck:
      test: wget -qO- http://localhost:6333/ | grep -q '"title":"qdrant - vector search engine"' || exit 1
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 512M

  neo4j:
    image: neo4j:latest
    command: ["bash", "-lc", "exec /var/lib/neo4j/bin/neo4j console"]
    volumes:
      - ./neo4j/logs:/logs
      - ./neo4j/config:/config
      - ./neo4j/data:/data
      - ./neo4j/plugins:/plugins
    ports:
      - "${NEO4J_HTTP_PORT:-8005}:7474"
      - "${NEO4J_BOLT_PORT:-8006}:7687"
    expose:
      - 7473/tcp
      - 7474/tcp
      - 7687/tcp
    environment:
      - NEO4J_AUTH=${NEO4J_AUTH:-"neo4j/your_password"}
      - NEO4J_server_memory_heap_initial__size=512m
      - NEO4J_server_memory_heap_max__size=768m
      - NEO4J_server_memory_pagecache_size=128m
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "cypher-shell -u neo4j -p password 'RETURN 1' || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 512M

  caddy:
    container_name: laip-caddy
    image: docker.io/library/caddy:2-alpine
    restart: unless-stopped
    ports:
      - "8081:80"
      - "8444:443"
      - "8111:8111"
      - "0.0.0.0:18080:18080"
    expose:
      - 2019/tcp
      - 443/tcp
      - 443/udp
      - 80/tcp
      - 8111/tcp
    volumes:
      - ./laip_caddy-config:/etc/caddy:ro
      - laip_caddy-data:/data:rw
      - laip_caddy-server-config:/config:rw
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - N8N_HOSTNAME=${N8N_HOSTNAME:-":8001"}
      - WEBUI_HOSTNAME=${WEBUI_HOSTNAME:-":8002"}
      - FLOWISE_HOSTNAME=${FLOWISE_HOSTNAME:-":8003"}
      - OLLAMA_HOSTNAME=${OLLAMA_HOSTNAME:-":8004"}
      - SUPABASE_HOSTNAME=${SUPABASE_HOSTNAME:-":8005"}
      - SEARXNG_HOSTNAME=${SEARXNG_HOSTNAME:-":8006"}
      - LANGFUSE_HOSTNAME=${LANGFUSE_HOSTNAME:-":8007"}
      - NEO4J_HOSTNAME=${NEO4J_HOSTNAME:-":8008"}
      - LETSENCRYPT_EMAIL=${LETSENCRYPT_EMAIL:-internal}
    networks:
      - laip_ai_network
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    logging:
      driver: "json-file"
      options:
        max-size: "1m"
        max-file: "1"
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 512M

  langfuse-worker:
    image: langfuse/langfuse:3
    depends_on:
      clickhouse:
        condition: service_healthy
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      <<: *langfuse-common
      SERVER_ID: "worker"
      LANGFUSE_WEB_SERVER: "false"
    networks:
      - laip_ai_network
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 512M

  langfuse-web:
    image: langfuse/langfuse:3
    restart: always
    depends_on:
      clickhouse:
        condition: service_healthy
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    expose:
      - 3000/tcp
    ports:
      - "${LANGFUSE_PORT:-3002}:3000"
    environment:
      <<: *langfuse-common
      NEXTAUTH_URL: http://localhost:3002
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
      LANGFUSE_INIT_ORG_ID: ${LANGFUSE_INIT_ORG_ID:-}
      LANGFUSE_INIT_ORG_NAME: ${LANGFUSE_INIT_ORG_NAME:-}
      LANGFUSE_INIT_PROJECT_ID: ${LANGFUSE_INIT_PROJECT_ID:-}
      LANGFUSE_INIT_PROJECT_NAME: ${LANGFUSE_INIT_PROJECT_NAME:-}
      LANGFUSE_INIT_PROJECT_PUBLIC_KEY: ${LANGFUSE_INIT_PROJECT_PUBLIC_KEY:-}
      LANGFUSE_INIT_PROJECT_SECRET_KEY: ${LANGFUSE_INIT_PROJECT_SECRET_KEY:-}
      LANGFUSE_INIT_USER_EMAIL: ${LANGFUSE_INIT_USER_EMAIL:-}
      LANGFUSE_INIT_USER_NAME: ${LANGFUSE_INIT_USER_NAME:-}
      LANGFUSE_INIT_USER_PASSWORD: ${LANGFUSE_INIT_USER_PASSWORD:-}
    networks:
      - laip_ai_network
    healthcheck:
      test: wget -qO- http://localhost:3000/health || exit 1
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 512M

  clickhouse:
    image: clickhouse/clickhouse-server
    restart: unless-stopped
    user: "101:101"
    expose:
      - 8123/tcp
      - 9000/tcp
      - 9009/tcp
    environment:
      CLICKHOUSE_DB: default
      CLICKHOUSE_USER: clickhouse
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD}
    volumes:
      - laip_langfuse_clickhouse_data:/var/lib/clickhouse
      - laip_langfuse_clickhouse_logs:/var/log/clickhouse-server
      - ./clickhouse-config:/etc/clickhouse-server/config.d:ro
    healthcheck:
      test: wget --no-verbose --tries=1 --spider http://localhost:8123/ping || exit 1
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 1s
    deploy:
      resources:
          limits:
            cpus: '1.0'
            memory: 1G
          reservations:
            cpus: '0.5'
            memory: 512M

  minio:
    image: minio/minio
    restart: unless-stopped
    entrypoint: sh
    # create the 'langfuse' bucket before starting the service
    command: -c 'mkdir -p /data/langfuse && minio server --address ":9000" --console-address ":9001" /data'
    expose:
      - 9000/tcp
      - 9001/tcp
    environment:
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - laip_langfuse_minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 1s
      timeout: 5s
      retries: 5
      start_period: 1s
    deploy:
      resources:
          limits:
            cpus: '1.0'
            memory: 1G
          reservations:
            cpus: '0.5'
            memory: 512M

  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: langfuse
    volumes:
      - laip_langfuse_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 512M

  redis:
    container_name: laip-redis
    image: docker.io/valkey/valkey:8-alpine
    command: valkey-server --save 30 1 --loglevel warning --maxmemory 256mb --maxmemory-policy allkeys-lru
    restart: unless-stopped
    expose:
      - 6379/tcp
    volumes:
      - laip_valkey-data:/data
    cap_drop:
      - ALL
    cap_add:
      - SETGID
      - SETUID
      - DAC_OVERRIDE
    logging:
      driver: "json-file"
      options:
        max-size: "1m"
        max-file: "1"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 3s
      timeout: 10s
      retries: 10
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 512M

  searxng:
    container_name: laip-searxng
    image: docker.io/searxng/searxng:latest
    user: root
    restart: unless-stopped
    ports:
      - "8088:8080"
    expose:
      - 8080/tcp
    volumes:
      - ./searxng:/etc/searxng:rw
    environment:
      - SEARXNG_BASE_URL=https://${SEARXNG_HOSTNAME:-localhost}/
      - UWSGI_WORKERS=${SEARXNG_UWSGI_WORKERS:-4}
      - UWSGI_THREADS=${SEARXNG_UWSGI_THREADS:-4}
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETGID
      - SETUID
    logging:
      driver: "json-file"
      options:
        max-size: "1m"
        max-file: "1"
    deploy:
      resources:
          limits:
            cpus: '1.0'
            memory: 1G
          reservations:
            cpus: '0.5'
            memory: 512M

  ollama-cpu:
    profiles: ["cpu"]
    <<: *service-ollama

  ollama-gpu:
    profiles: ["gpu-nvidia"]
    <<: *service-ollama
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

  ollama-gpu-amd:
    profiles: ["gpu-amd"]
    <<: *service-ollama
    image: ollama/ollama:rocm
    devices:
      - "/dev/kfd"
      - "/dev/dri"

  ollama-pull-llama-cpu:
    profiles: ["cpu"]
    <<: *init-ollama
    depends_on:
      - ollama-cpu

  ollama-pull-llama-gpu:
    profiles: ["gpu-nvidia"]
    <<: *init-ollama
    depends_on:
      - ollama-gpu

  ollama-pull-llama-gpu-amd:
    profiles: [gpu-amd]
    <<: *init-ollama
    image: ollama/ollama:rocm
    depends_on:
     - ollama-gpu-amd

networks:
  laip_ai_network:
    external: true
    name: ai_network
